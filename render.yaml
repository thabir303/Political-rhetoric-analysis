services:
  - type: web
    name: rag-ir-backend
    env: python  # Changed from docker to python
    runtime: python-3.11
    region: oregon
    plan: free  # Free tier
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    
    envVars:
      - key: APP_NAME
        value: RAG-IR API
      
      - key: ENVIRONMENT
        value: production
      
      - key: CHROMA_PERSIST_DIRECTORY
        value: /data/chroma_db
      
      - key: CHROMA_COLLECTION_NAME
        value: articles
      
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      
      - key: ADMIN_EMAIL
        sync: false  # Set manually: adminuser@admin.com
      
      - key: ADMIN_PASSWORD
        sync: false  # Set manually: politicaladmin@1321
      
      - key: JWT_SECRET
        generateValue: true  # Auto-generate secure secret
      
      - key: JWT_ALGORITHM
        value: HS256
      
      - key: JWT_EXPIRATION_HOURS
        value: 24
      
      - key: ALLOWED_ORIGINS
        sync: false  # Set after frontend deployed
      
      - key: GROQ_API_KEY
        sync: false  # Get free at: https://console.groq.com
      
      - key: GEMINI_API_KEY
        sync: false  # Get free at: https://makersuite.google.com/app/apikey
      
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
    
    # Persistent Disk (1GB FREE on free tier!)
    disk:
      name: chromadb-storage
      mountPath: /data
      sizeGB: 1
